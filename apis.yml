apis:
- aid: guidewire:guidewire-policycenter-api
  name: Guidewire PolicyCenter API
  tags:
  - Insurance
  - Policy
  - P&C
  - Underwriting
  image: https://raw.githubusercontent.com/api-evangelist/guidewire/refs/heads/main/image.png
  humanURL: https://docs.guidewire.com/
  baseURL: https://api.guidewire.com
  properties:
  - url: https://docs.guidewire.com/
    type: Documentation
  - url: https://www.guidewire.com/developers
    type: Getting Started
  - url: openapi/guidewire-policycenter-openapi.yml
    type: OpenAPI
  description: >-
    The Guidewire PolicyCenter API provides REST endpoints for policy lifecycle management, underwriting workflows, policy issuance, endorsements, renewals, and cancellations for property and casualty insurance carriers.

- aid: guidewire:guidewire-claimcenter-api
  name: Guidewire ClaimCenter API
  tags:
  - Insurance
  - Claims
  - P&C
  - Loss Adjustment
  image: https://raw.githubusercontent.com/api-evangelist/guidewire/refs/heads/main/image.png
  humanURL: https://docs.guidewire.com/
  baseURL: https://api.guidewire.com
  properties:
  - url: https://docs.guidewire.com/
    type: Documentation
  - url: https://www.guidewire.com/developers
    type: Getting Started
  - url: openapi/guidewire-claimcenter-openapi.yml
    type: OpenAPI
  description: >-
    The Guidewire ClaimCenter API provides REST endpoints for claims intake, assignment, investigation, reserving, payment processing, and closure workflows for P&C insurance claim operations.

- aid: guidewire:guidewire-billingcenter-api
  name: Guidewire BillingCenter API
  tags:
  - Insurance
  - Billing
  - Payments
  - P&C
  image: https://raw.githubusercontent.com/api-evangelist/guidewire/refs/heads/main/image.png
  humanURL: https://docs.guidewire.com/
  baseURL: https://api.guidewire.com
  properties:
  - url: https://docs.guidewire.com/
    type: Documentation
  - url: https://www.guidewire.com/developers
    type: Getting Started
  description: >-
    The Guidewire BillingCenter API provides REST endpoints for payment orchestration, invoice generation, payment plans, disbursements, and collections management for insurance billing operations.

- aid: guidewire:guidewire-integration-gateway-api
  name: Guidewire Integration Gateway API
  tags:
  - Insurance
  - Integration
  - Middleware
  - P&C
  image: https://raw.githubusercontent.com/api-evangelist/guidewire/refs/heads/main/image.png
  humanURL: https://docs.guidewire.com/
  baseURL: https://api.guidewire.com
  properties:
  - url: https://docs.guidewire.com/
    type: Documentation
  - url: https://www.guidewire.com/developers
    type: Getting Started
  - url: asyncapi/guidewire-integration-gateway-asyncapi.yml
    type: AsyncAPI
  description: >-
    The Guidewire Integration Gateway provides a managed API layer for connecting Guidewire Cloud applications to third-party systems, enabling event-driven integrations and REST API extensions for the Guidewire insurance platform.

